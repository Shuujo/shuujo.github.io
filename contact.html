<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="styles.css">
    <head>
        <title>Home</title>
    </head>

    <body>
        <!-- Nav Bar Main-->
        <nav class="mainNavbar">
            <ul>
                <li>
                    <a href="index.html">Home</a>
                </li>
                <li>
                    <a href="tags.html">HTML Tags and Essentials</a>
                </li>
                <li>
                    <a href="contact.html" class="active">Contact Me</a>
                </li>
            </ul>    
        </nav>
        <div class="mainBanner">
            <div style="width: 85%; margin-left: 10%;">
                <h1>
                    Contact Me
                </h1>
                <p style="text-align: right;">Hello! Welcome to the Contact Me page. This page will allow you to send a message to my personal e-mail. (It won't)</p>
                <table style="margin-left:75%; text-align: right;">
                    <tr>
                        <td>
                            First Name:
                        </td>
                        <td>
                            <input type="text" placeholder="First Name" size="25">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            Last Name:
                        </td>
                        <td>
                            <input type="text" placeholder="Last Name" size="25">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            Email:
                        </td>
                        <td>
                            <input type="text" placeholder="Email" size="25">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            Phone Number:
                        </td>
                        <td>
                            <input type="tel" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}" size="25" placeholder="Phone Number">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            Message:
                        </td>
                        <td>
                            <textarea rows="10" cols="20">

                            </textarea>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <input type="button" value="Send">
                        </td>
                    </tr>
                </table>
            </div>
        </div>
        <!-- Main div to wrap entire body -->
        <div class="mainBody">
        </div>
    </body>
</html>
